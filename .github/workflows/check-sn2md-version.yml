name: Check for new sn2md version

# Runs weekly on Monday mornings and checks PyPI for a new sn2md release.
# If a newer version is found than SN2MD_VERSION below, sends a Notifiarr
# notification so you know to update both workflow files and tag a new release.
#
# When upstream publishes a new sn2md version:
#   1. You'll get a Discord notification from this workflow
#   2. Update SN2MD_VERSION in BOTH this file and docker-publish.yml
#   3. git tag snobmd-<NEW_SNOBMD_VERSION>
#   4. git push origin snobmd-<NEW_SNOBMD_VERSION>
#
# Required GitHub secret:
#   NOTIFIARR_PASSTHROUGH_URL — full Notifiarr passthrough URL including your API key

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  # Keep this in sync with SN2MD_VERSION in docker-publish.yml
  SN2MD_VERSION: '2.6.0'

jobs:
  check-version:
    name: Check PyPI for new sn2md release
    runs-on: ubuntu-latest

    steps:
      - name: Get latest sn2md version from PyPI
        id: pypi
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/sn2md/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "LATEST_PYPI=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest sn2md on PyPI: ${LATEST}"

      - name: Compare versions
        id: compare
        run: |
          PYPI="${{ steps.pypi.outputs.LATEST_PYPI }}"
          CURRENT="${{ env.SN2MD_VERSION }}"

          IS_NEWER=$(python3 -c "
          from packaging.version import Version
          print('true' if Version('${PYPI}') > Version('${CURRENT}') else 'false')
          ")
          echo "IS_NEWER=${IS_NEWER}" >> "$GITHUB_OUTPUT"
          echo "PyPI ${PYPI} newer than current ${CURRENT}: ${IS_NEWER}"

      - name: Notify via Notifiarr (new version available)
        if: steps.compare.outputs.IS_NEWER == 'true'
        run: |
          curl -s -X POST "${{ secrets.NOTIFIARR_PASSTHROUGH_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "notification": {
                "update": false,
                "name": "snobmd",
                "event": "0"
              },
              "discord": {
                "color": "FFA500",
                "text": {
                  "title": "🆕 New sn2md version available",
                  "content": "**sn2md ${{ steps.pypi.outputs.LATEST_PYPI }}** has been published to PyPI.\n\nYour image is currently using **sn2md ${{ env.SN2MD_VERSION }}**.\n\nTo update:\n1. Set `SN2MD_VERSION` to `${{ steps.pypi.outputs.LATEST_PYPI }}` in both `docker-publish.yml` and `check-sn2md-version.yml`\n2. Commit and tag: `git tag snobmd-<NEW_VERSION>`\n3. Push the tag: `git push origin snobmd-<NEW_VERSION>`\n\nChangelog: https://pypi.org/project/sn2md/#history"
                }
              }
            }'

      - name: Log result (no update needed)
        if: steps.compare.outputs.IS_NEWER == 'false'
        run: |
          echo "✅ Already up to date. PyPI: ${{ steps.pypi.outputs.LATEST_PYPI }}, Current: ${{ env.SN2MD_VERSION }}"

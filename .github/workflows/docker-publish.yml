name: Build and Push to Docker Hub

# Trigger: push a tag like "snobmd-1.0.0"
# This uses SnobMD's own versioning, decoupled from upstream sn2md releases.
#
# To release a new image:
#   1. git tag snobmd-<VERSION>   e.g. git tag snobmd-1.0.0
#   2. git push origin snobmd-1.0.0
#   3. This workflow builds and pushes:
#        hypeseverer/snobmd:snobmd-1.0.0   (pinned version tag)
#        hypeseverer/snobmd:latest          (floating latest tag)
#   4. Notifiarr sends a Discord notification confirming success (or failure)
#
# To update the upstream sn2md version baked into the image:
#   - Change SN2MD_VERSION in the env block below
#   - Bump the snobmd version tag accordingly
#
# Required GitHub secret:
#   NOTIFIARR_PASSTHROUGH_URL — full Notifiarr passthrough URL including your API key

on:
  push:
    tags:
      - 'snobmd-*'
  workflow_dispatch:
    inputs:
      snobmd_version:
        description: 'SnobMD version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOCKERHUB_USERNAME: hypeseverer
  IMAGE_NAME: hypeseverer/snobmd
  NOTIFIARR_URL: ${{ secrets.NOTIFIARR_PASSTHROUGH_URL }}
  SN2MD_VERSION: '2.6.0'

jobs:
  build-and-push:
    name: Build multi-arch image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract SnobMD version
        id: version
        run: |
          # Tag is "snobmd-1.0.0" → SNOBMD_VERSION becomes "1.0.0"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SNOBMD_VERSION="${{ github.event.inputs.snobmd_version }}"
          else
            SNOBMD_VERSION="${GITHUB_REF_NAME#snobmd-}"
          fi
          echo "SNOBMD_VERSION=${SNOBMD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building SnobMD version: ${SNOBMD_VERSION} with sn2md: ${{ env.SN2MD_VERSION }}"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SN2MD_VERSION=${{ env.SN2MD_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:snobmd-${{ steps.version.outputs.SNOBMD_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Notify via Notifiarr (success)
        if: success() && env.NOTIFIARR_URL != 'disabled'
        run: |
          curl -s -X POST "${{ secrets.NOTIFIARR_PASSTHROUGH_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "notification": {
                "update": false,
                "name": "snobmd",
                "event": "0"
              },
              "discord": {
                "color": "00AA00",
                "text": {
                  "title": "✅ snobmd image published",
                  "content": "New Docker image pushed to Docker Hub.\n\n**Version:** snobmd-${{ steps.version.outputs.SNOBMD_VERSION }}\n**sn2md:** ${{ env.SN2MD_VERSION }}\n**Tags:** `snobmd-${{ steps.version.outputs.SNOBMD_VERSION }}` and `latest`\n**Image:** `hypeseverer/snobmd`\n\nDeploy with:\n`docker pull hypeseverer/snobmd:latest`"
                }
              }
            }'

      - name: Notify via Notifiarr (failure)
        if: failure() && env.NOTIFIARR_URL != 'disabled'
        run: |
          curl -s -X POST "${{ secrets.NOTIFIARR_PASSTHROUGH_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "notification": {
                "update": false,
                "name": "snobmd",
                "event": "0"
              },
              "discord": {
                "color": "FF0000",
                "text": {
                  "title": "❌ snobmd build failed",
                  "content": "Docker build or push failed for snobmd-${{ steps.version.outputs.SNOBMD_VERSION }}.\n\nCheck the Actions log:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }
            }'

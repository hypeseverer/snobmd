name: Build and Push to Docker Hub

# Trigger: push a tag like "sn2md-2.6.0" or "sn2md-2.7.0"
# This ties your Docker image version directly to the upstream sn2md PyPI version.
#
# To release a new image after upstream publishes a new sn2md version:
#   1. The check-sn2md-version.yml workflow will notify you via Notifiarr when upstream publishes
#   2. git tag sn2md-<NEW_VERSION>   e.g. git tag sn2md-2.7.0
#   3. git push origin sn2md-2.7.0
#   4. This workflow builds and pushes:
#        hypeseverer/snobmd:sn2md-2.7.0   (pinned version tag)
#        hypeseverer/snobmd:latest          (floating latest tag)
#   5. Notifiarr sends a Discord notification confirming success (or failure)
#
# Required GitHub secret:
#   NOTIFIARR_PASSTHROUGH_URL — full Notifiarr passthrough URL including your API key
#   Format: https://notifiarr.com/api/v1/notification/passthrough/<YOUR_API_KEY>/<CHANNEL_ID>

on:
  push:
    tags:
      - 'sn2md-*'

env:
  DOCKERHUB_USERNAME: hypeseverer
  IMAGE_NAME: hypeseverer/snobmd

jobs:
  build-and-push:
    name: Build multi-arch image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract sn2md version from tag
        id: version
        run: |
          # Tag is "sn2md-2.6.0" → SN2MD_VERSION becomes "2.6.0"
          SN2MD_VERSION="${GITHUB_REF_NAME#sn2md-}"
          echo "SN2MD_VERSION=${SN2MD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building with sn2md version: ${SN2MD_VERSION}"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          # Add DOCKERHUB_TOKEN to your GitHub repo secrets:
          # Settings → Secrets and variables → Actions → New repository secret
          # Generate token at: https://hub.docker.com/settings/security
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Pass the version as a build arg so it's baked into the image
          build-args: |
            SN2MD_VERSION=${{ steps.version.outputs.SN2MD_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:sn2md-${{ steps.version.outputs.SN2MD_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Notify via Notifiarr (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.NOTIFIARR_PASSTHROUGH_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "notification": {
                "update": false,
                "name": "snobmd",
                "event": "0"
              },
              "discord": {
                "color": "00AA00",
                "text": {
                  "title": "✅ snobmd image published",
                  "content": "New Docker image pushed to Docker Hub.\n\n**Version:** sn2md-${{ steps.version.outputs.SN2MD_VERSION }}\n**Tags:** `sn2md-${{ steps.version.outputs.SN2MD_VERSION }}` and `latest`\n**Image:** `hypeseverer/snobmd`\n\nDeploy with:\n`docker pull hypeseverer/snobmd:latest`"
                }
              }
            }'

      - name: Notify via Notifiarr (failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.NOTIFIARR_PASSTHROUGH_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "notification": {
                "update": false,
                "name": "snobmd",
                "event": "0"
              },
              "discord": {
                "color": "FF0000",
                "text": {
                  "title": "❌ snobmd build failed",
                  "content": "Docker build or push failed for sn2md-${{ steps.version.outputs.SN2MD_VERSION }}.\n\nCheck the Actions log:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }
            }'
